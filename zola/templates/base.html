<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>

    <!-- SEO: Canonical URL (always points to production) -->
    <link rel="canonical" href="{{ config.base_url }}{{ current_path }}">

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:url" content="{{ config.base_url }}{{ current_path }}">
    <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ config.description }}{% endblock %}">
    <meta property="og:site_name" content="{{ config.title }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% block twitter_title %}{{ config.title }}{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}{{ config.description }}{% endblock %}">

    <!-- theme:flash start -->
    <script>
        // Apply theme immediately to prevent flash
        (function() {
            var match = document.cookie.match(/(^| )preferred-theme=([^;]+)/);
            var pref = match ? match[2] : 'default';
            var theme = pref === 'default'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : pref;
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('data-pref', pref);
        })();
        // "Living ink" chrome, ON BY DEFAULT: WebGPU devices get the animated shader
        // field, everyone else gets the flat tier. ?field=off is the kill switch
        // (see field-chrome.js for the full ?field=gpu|flat|off|diag scheme).
        if (new URLSearchParams(location.search).get('field') !== 'off') {
            // Curtain until the field has measured & built (fonts settled), so a hard
            // refresh doesn't flash unstyled chrome. Pure-CSS 0.3s reveal is the fail-safe:
            // even if the script 404s or dies, the page shows.
            document.documentElement.classList.add('fielding');
            var fs = document.createElement('script');
            fs.src = '/field-chrome.js'; fs.defer = true;
            document.head.appendChild(fs);
        }
    </script>
    <!-- theme:flash end -->
    <!-- theme:style start -->
    <style>
        /* Two themes, both monochrome — black-and-white, no colour anywhere. Links carry no
           hue; the underline (below) is what marks them. */
        :root[data-theme="light"] {
            --bg: #ffffff;
            --text: #333;
            --text-muted: #666;
            --link: #111;
            --border: #ddd;
            --code-bg: #f5f5f5;
            --tag-bg: #eee;
            /* chrome ink: everything the living-ink field covers (headings, rules, nav,
               meta, pills) renders in this when the field isn't painting — so no-JS and
               no-GPU pages show the designed look with zero script involvement. */
            --chrome: #111111;
        }
        :root[data-theme="dark"] {
            /* Pure black. Text a hair off white to soften halation. */
            color-scheme: dark;
            --bg: #000000;
            --text: #ededed;
            --text-muted: #808080;
            --link: #ffffff;
            --border: #4a4a4a;
            --code-bg: #141414;
            --tag-bg: #202020;
            --chrome: #eeeeee;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
        }
        /* Masthead hierarchy: the h1 gets the page's one rule; sections stand bare.
           Headings + rules are chrome — they carry the field when it paints. */
        h1, h2, h3 { color: var(--chrome); padding-bottom: 10px; }
        h1 { border-bottom: 2px solid var(--chrome); }
        hr { border: none; height: 2px; background: var(--chrome); }
        a { color: var(--link); text-decoration: underline; }
        ul, ol { padding-left: 1.5rem; margin: 1rem 0; }
        li { margin: 0.5rem 0; }
        /* ul bullets: ONE rule renders the disc two ways — as ::before when no JS runs,
           and as a real .fc-bullet span once the field engine boots (html.fc-js). Same
           declarations => same box => identical pixels; the span exists so the GPU tier
           can MEASURE it like every other component instead of recomputing geometry.
           ol keeps native numbers, in chrome ink. */
        ul { list-style: none; }
        ul li { position: relative; }
        ul li::before, ul li .fc-bullet {
            content: ""; position: absolute; left: -0.85em; top: 0.61em;
            width: 0.38em; height: 0.38em; border-radius: 50%; background: var(--chrome);
        }
        html.fc-js ul li::before { content: none; }
        nav ul li::before, nav ul li .fc-bullet { content: none; display: none; }
        li::marker { color: var(--chrome); }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { margin: 0; }
        code { background: var(--code-bg); padding: 0.2rem 0.4rem; border-radius: 3px; }
        pre { background: var(--code-bg); padding: 1rem; border-radius: 5px; overflow-x: auto; color: var(--text); }
        pre code { background: none; padding: 0; }
        /* Syntax tokens (Zola highlight_theme = "css" emits z-* classes): the c4ffein nvim
           colorscheme — dark theme verbatim (its editor bg is literally #111111, the site's
           chrome ink), light theme a hue-faithful darkened twin. Code is the one place on
           this monochrome site where colour lives, same as in the editor. */
        :root[data-theme="light"] {
            --syn-comment: #777777; --syn-string: #0e7a44; --syn-number: #a05a2c;
            --syn-const: #8a7a00; --syn-keyword: #0778a5; --syn-storage: #c2317f;
            --syn-func: #0778a5; --syn-op: #c33fa0; --syn-type: #7c4dcc;
        }
        :root[data-theme="dark"] {
            --syn-comment: #777777; --syn-string: #88ffaa; --syn-number: #ffccaa;
            --syn-const: #f1fa8c; --syn-keyword: #88eeff; --syn-storage: #ff79c6;
            --syn-func: #88eeff; --syn-op: #ff92df; --syn-type: #bd93f9;
        }
        .z-comment { color: var(--syn-comment); }
        .z-string { color: var(--syn-string); }
        .z-constant.z-numeric { color: var(--syn-number); }
        .z-constant { color: var(--syn-const); }
        .z-keyword { color: var(--syn-keyword); }
        .z-keyword.z-operator { color: var(--syn-op); }
        .z-storage { color: var(--syn-storage); }
        .z-entity.z-name.z-function, .z-support.z-function { color: var(--syn-func); }
        .z-entity.z-name.z-type, .z-support.z-type, .z-support.z-class { color: var(--syn-type); }
        blockquote { border-left: 3px solid var(--chrome); margin-left: 0; padding-left: 1rem; color: var(--text-muted); }
        nav { margin-bottom: 2.9rem; display: flex; align-items: center; }
        /* Poppins (700) for the nav labels — inlined below, so no request/flash. No underline:
           they read as navigation, not body links. Falls back to the system sans if unloaded. */
        nav a {
            /* Fluid: loud on desktop, scales down so it never overflows a narrow phone. */
            margin-right: 1rem; font-size: clamp(1rem, 3.4vw, 1.5rem);
            font-family: "Poppins", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 700; text-decoration: none; letter-spacing: -0.01em;
            color: var(--chrome);
        }
        #theme-toggle {
            margin-left: auto;
            background: none; color: var(--chrome);
            border: none; padding: 0;
            cursor: pointer; font-size: 1.2rem;
            width: 1.5em; height: 1.5em;
            line-height: 1.5em; text-align: center;
        }
        #theme-toggle:hover { color: var(--link); }
        /* ?field curtain: hidden until the engine reveals (class removed), or 0.3s passes —
           the keyframe fires on pure CSS, so no JS failure can leave the page blank. */
        html.fielding body { visibility: hidden; animation: fc-reveal 0s 0.3s forwards; }
        @keyframes fc-reveal { to { visibility: visible; } }
        /* presentations-omit start */
        article { margin-bottom: 3rem; }
        .post-meta { color: var(--chrome); font-size: 0.9rem; }
        .tags { margin-top: 0.5rem; }
        .tag { background: var(--chrome); color: var(--bg); padding: 0.2rem 0.5rem; border-radius: 3px; font-size: 0.8rem; }
        details { margin: 1rem 0; }
        summary { cursor: pointer; font-weight: bold; }
        /* presentations-omit end */
    </style>
    <!-- theme:style end -->
    {# Poppins (700), subset to the nav's letters and inlined as a data URI so the nav font is
       never a request and never flashes. Kept in its own <style> — generate_presentations.py
       scrapes only the first <style>, so this Tera call stays out of the presentations page. #}
    <style>
        @font-face {
            font-family: "Poppins";
            /* block, not swap: the face is inlined (data URI below), so its decode is effectively
               instant — there's no real invisible period — but block avoids painting the system
               fallback first and then reflowing to Poppins (the nav "glitch" swap caused). */
            font-style: normal; font-weight: 700; font-display: block;
            src: url(data:font/woff2;base64,{{ load_data(path="static/fonts/poppins-nav.b64", format="plain") | trim | safe }}) format("woff2");
        }
    </style>
    <!-- theme:cookie start -->
    <script>
        (function() {
            const COOKIE_NAME = 'preferred-theme';
            function getCookieDomain() {
                const host = window.location.hostname;
                return host.endsWith('.cafeine.dev') ? ';domain=.cafeine.dev' : '';
            }
            function getPreference() {
                const match = document.cookie.match(new RegExp('(^| )' + COOKIE_NAME + '=([^;]+)'));
                return match ? match[2] : 'default';
            }
            function setPreference(pref) {
                document.cookie = `${COOKIE_NAME}=${pref}${getCookieDomain()};path=/;max-age=31536000;SameSite=Lax`;
                applyTheme();
            }
            function getBrowserPreference() {
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            function getEffectiveTheme() {
                const pref = getPreference();
                return pref === 'default' ? getBrowserPreference() : pref;
            }
            function applyTheme() {
                document.documentElement.setAttribute('data-theme', getEffectiveTheme());
                updateToggleButton();
            }
            function cycleTheme() {
                setPreference(getEffectiveTheme() === 'light' ? 'dark' : 'light');
            }
            function updateToggleButton() {
                const btn = document.getElementById('theme-toggle');
                if (!btn) return;
                btn.textContent = getEffectiveTheme() === 'dark' ? '⏾' : '☀︎';
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', applyTheme);
            } else {
                applyTheme();
            }
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                if (getPreference() === 'default') applyTheme();
            });
            window.cycleTheme = cycleTheme;
        })();
    </script>
    <!-- theme:cookie end -->
    {# Per-page additions. Deliberately kept out of the blocks above: generate_presentations.py
       scrapes the theme's <style>/<script> out of this file by regex, and the presentations
       page has no <article> and can't serve /fonts from its own origin. #}
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        {# Plain "/" not get_url(path='/'): the latter renders empty when base_url is "/"
           (zola build -u /, used behind the nginx proxy). "/" is correct either way, root-served. #}
        <a href="/">Home</a>
        <a href="{{ get_url(path='posts') }}">Posts</a>
        <a href="https://presentations.cafeine.dev">Presentations</a>
        <!-- theme:toggle start --><button id="theme-toggle" onclick="cycleTheme()"><script>document.write(document.documentElement.getAttribute('data-theme')==='dark'?'⏾':'☀︎')</script></button><!-- theme:toggle end -->
    </nav>
    {% block content %}{% endblock %}
    {% block extra_body %}{% endblock %}
</body>
</html>
