base_url = "https://writings.cafeine.dev"
title = "Writings"
description = "Thoughts on tech, software engineering, and more"
compile_sass = true
generate_feeds = true
feed_filenames = ["rss.xml"]

taxonomies = [
    { name = "tags" },
]

[markdown]
highlight_code = true
# "css" emits class-based tokens (z-*) instead of baked inline styles, so token colors
# live in base.html's CSS and follow the light/dark theme (palette: the c4ffein nvim
# colorscheme for dark, plus a hue-faithful darkened twin for light).
highlight_theme = "css"

[extra]
author = "c4ffein"
